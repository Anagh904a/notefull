<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Error - No Internet</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center h-screen bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 text-white">

  <div class="text-center max-w-md p-8 bg-white/10 backdrop-blur-lg rounded-2xl shadow-2xl border border-white/20">

    <!-- Big Error Code -->
    <h1 class="text-7xl font-extrabold text-red-500 mb-2">404</h1>

    <!-- Title -->
    <h2 class="text-2xl font-semibold mb-3">Connection Lost</h2>

    <!-- Message -->
    <p class="text-gray-300 mb-6 leading-relaxed">
      Our app isn't offline-ready yet due to third-party dependencies.<br>
      Please connect to the internet to continue using all features.
    </p>

    <!-- Buttons -->
    <div class="flex justify-center gap-4">
      <button onclick="location.reload()" 
        class="bg-red-500 hover:bg-red-600 px-5 py-2 rounded-lg font-medium transition">
        Retry
      </button>

      <a href="/" 
        class="bg-blue-500 hover:bg-blue-600 px-5 py-2 rounded-lg font-medium transition">
        Go Home
      </a>
    </div>

    <!-- Small note -->
    <p class="text-xs text-gray-400 mt-6">
      Make sure your internet connection is active.
    </p>

  </div>

</body>
</html>
